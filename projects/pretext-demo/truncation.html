<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Demo - 智能截断与展开</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'PingFang SC', sans-serif; background: #f0f2f5; padding: 40px 20px; }
    h1 { color: #1a1a2e; text-align: center; font-size: 22px; margin-bottom: 8px; }
    p.sub { color: #666; text-align: center; margin-bottom: 36px; font-size: 14px; }
    .feed { max-width: 600px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }
    .card { background: white; border-radius: 16px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); transition: box-shadow 0.2s; overflow: hidden; }
    .card:hover { box-shadow: 0 6px 24px rgba(0,0,0,0.1); }
    .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
    .card-header .av { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; flex-shrink: 0; }
    .card-header .info h4 { font-size: 14px; color: #1a1a2e; font-weight: 600; }
    .card-header .info span { font-size: 12px; color: #999; }
    .card-content { position: relative; }
    .card-text { font-size: 14px; line-height: 1.8; color: #333; white-space: pre-wrap; }
    .card-text.truncated { display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }
    .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; padding-top: 14px; border-top: 1px solid #f0f0f0; }
    .card-footer .stats { display: flex; gap: 16px; }
    .card-footer .stat { font-size: 12px; color: #999; }
    .read-more { font-size: 13px; color: #5f67ee; cursor: pointer; font-weight: 600; user-select: none; }
    .read-more:hover { color: #4a54d4; }
    .badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 4px; font-weight: 600; margin-right: 8px; }
    .controls { max-width: 600px; margin: 0 auto 30px; display: flex; gap: 10px; justify-content: center; }
    .controls button { padding: 8px 18px; border: 1px solid #ddd; background: white; border-radius: 8px; cursor: pointer; font-size: 13px; color: #555; transition: all 0.2s; }
    .controls button:hover { border-color: #5f67ee; color: #5f67ee; }
    .controls button.active { background: #5f67ee; color: white; border-color: #5f67ee; }
    .height-indicator { font-size: 11px; color: #5f67ee; background: #5f67ee10; padding: 3px 8px; border-radius: 10px; }
  </style>
</head>
<body>
  <h1>📖 Pretext 智能截断与展开</h1>
  <p class="sub">精确计算截断位置 · 展开高度平滑过渡 · 无抖动</p>

  <div class="controls">
    <button class="active" onclick="setLimit(4)">4 行截断</button>
    <button onclick="setLimit(6)">6 行截断</button>
    <button onclick="setLimit(3)">3 行截断</button>
    <button onclick="setLimit(8)">8 行截断</button>
  </div>

  <div class="feed" id="feed"></div>

  <script type="module">
    import { prepare, layout } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js'

    const articles = [
      {
        author: '科技前沿', color: '#5f67ee', bg: '#eef0ff',
        title: 'WebGPU 图形渲染新纪元',
        text: `WebGPU 是 Web 平台上下一代图形 API，它提供了对 GPU 硬件的低级访问能力。相比 WebGL，WebGPU 在性能、功能和安全性方面都有质的飞跃。

WebGPU 的设计参考了 Vulkan、Metal 和 DirectX 12 等现代原生图形 API。它引入了渲染管道（Render Pipeline）、绑定组（Bind Group）等概念，让开发者能够更细粒度地控制 GPU 资源。

在 Three.js、DげUbber.js 等 3D 库已经开始支持 WebGPU 渲染后端。未来，基于 WebGPU 的 Web 游戏、3D 可视化、数据渲染将迎来爆发式增长。同时，机器学习推理也可通过 WebGPU 在浏览器中高效运行，结合 WebNN API 实现 AI 加速。

WebGPU 的另一大优势是计算着色器（Compute Shader）。这是 WebGL 所不支持的能力，允许直接在 GPU 上执行通用计算任务，为数据处理、粒子系统等场景提供了新的可能。`,
        time: '3小时前', likes: 238, comments: 42
      },
      {
        author: '生活随笔', color: '#2ecc71', bg: '#e8f8f0',
        title: '周末徒步的心得',
        text: `周末约了几个朋友去郊外徒步，全程大约15公里。从早上8点出发，下午4点才回到出发点。虽然很累，但一路上的风景真的很治愈。

出发前以为会很轻松，结果前5公里就气喘吁吁了。看来平时确实缺少运动。不过坚持下来之后，到后半程反而越走越顺，身体慢慢适应了节奏。

这次徒步让我印象最深的是登顶的那一刻。站在山顶往下看，所有的疲惫都值了。城市里的喧嚣被山脉隔绝，空气里有松树的清香，手机信号也变得很弱，反而让人更专注于眼前的风景。

下次想挑战更长的路线，或者尝试一下露营。`,
        time: '昨天', likes: 89, comments: 12
      },
      {
        author: '编程笔记', color: '#e67e22', bg: '#fef5e7',
        title: 'TypeScript 5.4 类型推断改进',
        text: `TypeScript 5.4 带来了多项类型系统改进，其中最值得关注的是 Narrowing in closures after last assignment（闭包中的类型收窄改进）。

在此之前，如果你在一个 if 块内给变量赋值，然后在闭包（如 setTimeout、Promise.then）中访问它，TypeScript 往往会推断变量类型为初始类型而非收窄后的类型。

TS 5.4 改进了这一行为：当变量在 if 块内最后一次被赋值时，闭包能够正确识别该变量的收窄类型。这大大减少了类型断言（as）的使用。

另一个重要改进是 NoInfer utility type 的引入。通过 NoInfer<T>，你可以告诉 TypeScript 在某个位置不要从参数推导类型，而使用默认的泛型约束。这在设计 API 时非常有用。

const createPair = <T, U>(first: NoInfer<T>, second: NoInfer<U>) => [first, second]
// 以前可能需要 as const 或额外类型参数来避免过度推导`,
        time: '2天前', likes: 156, comments: 28
      },
      {
        author: '读书笔记', color: '#e74c3c', bg: '#fdecea',
        title: '《原子习惯》读书笔记',
        text: `《原子习惯》的核心观点是：养成好习惯的关键不在于设定目标，而在于建立系统。每天进步1%，一年后将会有37倍的提升。这就是复利的力量。

书中提出了四步习惯循环：提示（ Cue）→渴求（Craving）→反应（Response）→奖励（Reward）。要养成好习惯，就要让这个循环显而易见、有吸引力、简单易行、令人满足。

关于身份认同，James Clear 提出了一个重要观点：不要只想着"我要戒烟"，而是成为"不吸烟的人"。当习惯与身份认同一致时，行为改变会更加持久。

他还推荐了两分钟规则：把新习惯分解到两分钟内可以完成的小步骤。不要一开始就追求完美，先让行为变得微小和容易执行，然后再逐步升级。`,
        time: '3天前', likes: 203, comments: 35
      },
    ]

    let lineLimit = 4
    const font = '14px Inter, "PingFang SC", sans-serif'
    const lineH = 25

    function getLineHeight(containerWidth) {
      return containerWidth - 40 // card padding
    }

    function renderFeed() {
      const feed = document.getElementById('feed')
      feed.innerHTML = ''

      articles.forEach((article, idx) => {
        const card = document.createElement('div')
        card.className = 'card'

        const fullPrepared = prepare(article.text, font)
        const contentWidth = 600 - 40
        const fullResult = layout(fullPrepared, contentWidth, lineH)
        const maxH = lineLimit * lineH

        // 预估截断文本
        let truncatedText = article.text
        let isTruncated = fullResult.height > maxH
        let previewPrepared = prepare(article.text, font)
        let previewResult = layout(previewPrepared, contentWidth, lineH)

        // 二分查找精确截断位置
        if (isTruncated) {
          let lo = 0, hi = article.text.length
          while (lo < hi) {
            const mid = Math.floor((lo + hi + 1) / 2)
            const p = prepare(article.text.slice(0, mid), font)
            const r = layout(p, contentWidth, lineH)
            if (r.height <= maxH) lo = mid
            else hi = mid - 1
          }
          truncatedText = article.text.slice(0, lo)
        }

        card.innerHTML = `
          <div class="card-header">
            <div class="av" style="background:${article.color}">${article.author[0]}</div>
            <div class="info">
              <h4>${article.author}</h4>
              <span>${article.time}</span>
            </div>
            <div class="height-indicator">全文 ${fullResult.lineCount} 行</div>
          </div>
          ${article.title ? `<div style="font-weight:700;font-size:15px;color:#1a1a2e;margin-bottom:10px">${article.title}</div>` : ''}
          <div class="card-content">
            <div class="card-text" id="text-${idx}">${isTruncated ? truncatedText : article.text}</div>
          </div>
          <div class="card-footer">
            <div class="stats">
              <span class="stat">❤️ ${article.likes}</span>
              <span class="stat">💬 ${article.comments}</span>
            </div>
            <span class="read-more" id="toggle-${idx}" onclick="toggle(${idx}, this)">${isTruncated ? '展开全文' : ''}</span>
          </div>
        `

        feed.appendChild(card)
        window[`_data_${idx}`] = { full: article.text, truncated: truncatedText, isFull: false }
      })
    }

    window.toggle = (idx, el) => {
      const data = window[`_data_${idx}`]
      const textEl = document.getElementById(`text-${idx}`)
      data.isFull = !data.isFull
      textEl.textContent = data.isFull ? data.full : data.truncated
      textEl.classList.toggle('truncated', !data.isFull)
      el.textContent = data.isFull ? '收起' : '展开全文'
    }

    window.setLimit = (n) => {
      lineLimit = n
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'))
      event.target.classList.add('active')
      renderFeed()
    }

    document.fonts.ready.then(renderFeed)
  </script>
</body>
</html>
