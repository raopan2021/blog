<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext Demo - 聊天消息气泡</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'PingFang SC', sans-serif; background: #0d1117; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 16px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #5f67ee, #a855f7); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; }
    .header-info h3 { color: #e6edf3; font-size: 15px; }
    .header-info span { color: #7d8590; font-size: 12px; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
    .msg { display: flex; gap: 10px; max-width: 75%; animation: fadeIn 0.3s ease; }
    .msg.me { align-self: flex-end; flex-direction: row-reverse; }
    .msg .av { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; }
    .msg.me .av { background: linear-gradient(135deg, #5f67ee, #a855f7); color: white; }
    .msg.bot .av { background: #21262d; color: #7d8590; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.6; word-break: break-word; position: relative; }
    .msg.me .bubble { background: linear-gradient(135deg, #5f67ee, #7c85f5); color: white; border-bottom-right-radius: 4px; }
    .msg.bot .bubble { background: #21262d; color: #e6edf3; border-bottom-left-radius: 4px; }
    .bubble .meta { font-size: 11px; opacity: 0.6; margin-top: 4px; text-align: right; }
    .input-area { padding: 16px 20px; background: #161b22; border-top: 1px solid #30363d; display: flex; gap: 12px; }
    .input-area input { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 24px; padding: 10px 16px; color: #e6edf3; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .input-area input:focus { border-color: #5f67ee; }
    .input-area button { background: #5f67ee; color: white; border: none; border-radius: 24px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 600; transition: background 0.2s; }
    .input-area button:hover { background: #4a54d4; }
    .typing { display: flex; gap: 6px; padding: 12px 16px; background: #21262d; border-radius: 18px; width: fit-content; }
    .typing span { width: 8px; height: 8px; background: #7d8590; border-radius: 50%; animation: bounce 1.4s infinite; }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 60%, 100% { transform: translateY(0) } 30% { transform: translateY(-6px) } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px) } to { opacity: 1; transform: translateY(0) } }
    .msg-group { display: flex; flex-direction: column; gap: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="avatar">AI</div>
    <div class="header-info">
      <h3>Pretext 智能助手</h3>
      <span>在线 · 基于 Pretext 精确文本测量</span>
    </div>
  </div>

  <div class="chat" id="chat"></div>

  <div class="input-area">
    <input type="text" id="msg-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button onclick="sendMsg()">发送</button>
  </div>

  <script type="module">
    import { prepare, layout } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js'

    const chat = document.getElementById('chat')
    const input = document.getElementById('msg-input')
    let botCursor = 0
    let font = '14px Inter, "PingFang SC", sans-serif'
    let lineHeight = 22
    let maxWidth = 0

    const responses = [
      'Pretext 的核心优势在于它能在不触发布局回流的情况下，精确测量文本高度。这对于虚拟列表、动态高度输入框等场景非常有用。',
      'Canvas 的 measureText API 是 Pretext 的测量基础。它利用浏览器内置的字体引擎，读取字形宽度表，完全不涉及 DOM 和渲染树。',
      'Knuth-Plass 算法是段落排版的经典算法，由 Donald Knuth 提出。它通过最小化每行的"糟糕度"（badness）来实现美观的排版效果。',
      'Unicode 字形簇（Grapheme Cluster）是一个用户感知到的字符。在 JavaScript 中，一个 emoji 可能占用多个码点，但 Pretext 能正确处理。',
      '虚拟滚动的关键难点在于高度计算。传统方案用估算高度，导致滚动条跳动。Pretext 让真实高度测量成为可能。',
      'Pretext 的 prepare() 是一次性开销，后续的 layout() 是纯算术运算。这使得它在处理 resize 事件时性能极佳。',
      '文本环绕是 Pretext 的一个高级应用场景。layoutNextLine() API 支持流式布局，每行宽度可以动态变化。',
      'Bidi 算法（双向文本算法）处理混合方向文本。阿拉伯文从右到左，和中文、英文混排时，Pretext 能正确处理显示顺序。',
    ]

    function getBubbleHeight(text, maxW) {
      const prepared = prepare(text, font)
      const { height } = layout(prepared, maxW - 28, lineHeight)
      return height + 20
    }

    function addMessage(text, isMe) {
      if (!maxWidth) maxWidth = chat.clientWidth * 0.75
      const h = getBubbleHeight(text, maxWidth)
      const time = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })

      const group = document.createElement('div')
      group.className = 'msg-group'
      const msgDiv = document.createElement('div')
      msgDiv.className = `msg ${isMe ? 'me' : 'bot'}`
      msgDiv.innerHTML = `
        <div class="av">${isMe ? '我' : 'AI'}</div>
        <div class="bubble" style="height:${h}px">
          ${text}
          <div class="meta">${time}</div>
        </div>
      `
      group.appendChild(msgDiv)
      chat.appendChild(group)
      chat.scrollTop = chat.scrollHeight
      return group
    }

    function addTyping() {
      const group = document.createElement('div')
      group.className = 'msg bot'
      group.id = 'typing-msg'
      group.innerHTML = `
        <div class="av">AI</div>
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      `
      chat.appendChild(group)
      chat.scrollTop = chat.scrollHeight
      return group
    }

    function removeTyping() {
      const el = document.getElementById('typing-msg')
      if (el) el.remove()
    }

    async function sendMsg() {
      const text = input.value.trim()
      if (!text) return
      input.value = ''
      addMessage(text, true)
      const typing = addTyping()
      await new Promise(r => setTimeout(r, 800 + Math.random() * 600))
      typing.remove()
      const resp = responses[botCursor % responses.length]
      botCursor++
      addMessage(resp, false)
    }

    // Demo auto messages
    const init = async () => {
      await new Promise(r => setTimeout(r, 600))
      addMessage('你好！我是基于 Pretext 的智能助手。有什么关于文本测量和布局的问题，尽管问我！', false)
    }

    init()
  </script>
</body>
</html>
