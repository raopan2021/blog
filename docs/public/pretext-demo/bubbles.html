<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext — Bubbles</title>
  <style>
    :root {
      --page: #f5f1ea;
      --panel: #fffdf8;
      --ink: #201b18;
      --muted: #6d645d;
      --rule: #d8cec3;
      --accent: #955f3b;
      --blue: #3b82f6;
      --blue-bg: #eff6ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #f5f7f5 0%, var(--page) 100%);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 40px 20px;
    }
    .page { max-width: 560px; margin: 0 auto; }
    .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-family: "SF Mono", ui-monospace, monospace; }
    h1 { font: 700 32px/1.1 Georgia, serif; margin-bottom: 12px; color: var(--ink); }
    .intro { font-size: 14px; line-height: 1.6; color: var(--muted); margin-bottom: 28px; }
    .chat { display: flex; flex-direction: column; gap: 12px; padding: 20px; background: var(--panel); border: 1px solid var(--rule); border-radius: 20px; box-shadow: 0 8px 32px rgba(54,40,23,0.07); }
    .msg { display: flex; gap: 10px; max-width: 85%; }
    .msg.right { align-self: flex-end; flex-direction: row-reverse; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: white; flex-shrink: 0; align-self: flex-end; }
    .bubble-wrap { display: flex; flex-direction: column; gap: 3px; }
    .msg.right .bubble-wrap { align-items: flex-end; }
    .bubble { padding: 10px 14px; border-radius: 18px; font-size: 14px; line-height: 1.65; word-break: break-word; position: relative; }
    .msg.left .bubble { background: white; border: 1px solid var(--rule); color: var(--ink); border-bottom-left-radius: 4px; }
    .msg.right .bubble { background: var(--blue); color: white; border-bottom-right-radius: 4px; }
    .meta { font-size: 10px; color: #aaa; padding: 0 4px; }
    .msg.right .meta { text-align: right; }
    .height-tag { font-size: 10px; color: var(--accent); font-family: "SF Mono", monospace; opacity: 0.7; }
    .input-row { margin-top: 16px; display: flex; gap: 8px; }
    .input-row input { flex: 1; padding: 10px 14px; border: 1px solid var(--rule); border-radius: 24px; font-size: 14px; background: #fafaf8; outline: none; transition: border-color 0.2s; }
    .input-row input:focus { border-color: var(--blue); }
    .input-row button { padding: 10px 18px; background: var(--blue); color: white; border: none; border-radius: 24px; font-size: 13px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .input-row button:hover { opacity: 0.85; }
    .controls { margin-top: 20px; display: flex; gap: 10px; flex-wrap: wrap; }
    .controls label { font-size: 13px; color: var(--muted); }
    input[type="range"] { width: 120px; accent-color: var(--blue); }
    .width-val { font-size: 12px; color: var(--blue); font-family: "SF Mono", monospace; min-width: 45px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">Pretext Demo</div>
    <h1>Bubbles</h1>
    <p class="intro">多行聊天气泡——每个气泡的高度由 Pretext 精确预测，没有任何浪费的空间。试试在下方输入消息，观察气泡如何"刚好"包裹内容。</p>

    <div class="chat" id="chat">
      <div class="msg left">
        <div class="avatar" style="background:#2ecc71">A</div>
        <div class="bubble-wrap">
          <div class="bubble">你好！Pretext 能精确测量文本高度，让气泡刚好包裹内容，没有多余空白。</div>
          <div class="meta">Alice · <span class="height-tag" id="h0">—</span></div>
        </div>
      </div>
      <div class="msg right">
        <div class="avatar" style="background:var(--blue)">B</div>
        <div class="bubble-wrap">
          <div class="bubble">太棒了！传统的 CSS 方案要么用固定高度（浪费空间），要么等渲染完再测量（抖动）。</div>
          <div class="meta"><span class="height-tag" id="h1">—</span> · Bob</div>
        </div>
      </div>
    </div>

    <div class="input-row">
      <input type="text" id="msg-input" placeholder="输入消息..." onkeydown="if(event.key==='Enter')send()">
      <button onclick="send()">发送</button>
    </div>

    <div class="controls">
      <label>气泡最大宽度: <span class="width-val" id="wval">320px</span></label>
      <input type="range" min="180" max="400" value="320" id="width-slider" oninput="updateWidth(this.value)">
      <button onclick="randomMsg()" style="background:var(--accent)">随机消息</button>
    </div>
  </div>

  <script type="module">
    import { prepare, layout } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js'

    const chat = document.getElementById('chat')
    const input = document.getElementById('msg-input')
    let maxWidth = 320
    let msgId = 2
    let font = '14px/1.65 Helvetica Neue, sans-serif'
    let lineHeight = 23.1

    const templates = [
      '这是一条短消息',
      '这条消息稍微长一些，包含更多的内容',
      'Knuth-Plass 算法由 Donald Knuth 和 Michael Plass 在 1970 年代提出，是现代排版系统的基石。',
      '🎉 祝贺！你的订单已确认',
      '收到！我们已安排发货，预计 3-5 个工作日送达。',
      'Hi there! This is an English message mixed with 中文内容，还有 emoji 🚀',
      '请问这个功能什么时候上线？产品经理说本周五发布，但开发反馈还需要两周。',
      '❤️👍🔥',
      '在 Web 开发中，布局回流（Layout Reflow）是性能杀手之一。每次调用 getBoundingClientRect()，浏览器都需要重新计算整个渲染树。Pretext 通过 Canvas 测量完全绕开了这个问题。',
    ]

    function getBubbleHeight(text) {
      const p = prepare(text, font)
      const { height, lineCount } = layout(p, maxWidth - 28, lineHeight)
      return { height, lineCount }
    }

    function addBubble(text, isRight) {
      const { height, lineCount } = getBubbleHeight(text)
      const hPx = Math.round(height)
      const tag = `${hPx}px · ${lineCount}行`

      const div = document.createElement('div')
      div.className = `msg ${isRight ? 'right' : 'left'}`
      div.innerHTML = `
        <div class="avatar" style="background:${isRight ? 'var(--blue)' : '#2ecc71'}">${isRight ? 'B' : 'A'}</div>
        <div class="bubble-wrap">
          <div class="bubble" style="height:${hPx + 20}px">${escapeHtml(text)}</div>
          <div class="meta"><span class="height-tag">${tag}</span> · ${isRight ? 'Bob' : 'Alice'}</div>
        </div>
      `
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
    }

    function escapeHtml(text) {
      return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    }

    window.send = () => {
      const text = input.value.trim()
      if (!text) return
      input.value = ''
      addBubble(text, true)
    }

    window.randomMsg = () => {
      const text = templates[Math.floor(Math.random() * templates.length)]
      addBubble(text, Math.random() > 0.5)
    }

    window.updateWidth = (val) => {
      maxWidth = parseInt(val)
      document.getElementById('wval').textContent = val + 'px'
      // Re-render all messages
      const msgs = chat.querySelectorAll('.msg')
      msgs.forEach((msg, i) => {
        const bubbleText = msg.querySelector('.bubble').textContent
        const { height, lineCount } = getBubbleHeight(bubbleText)
        const hPx = Math.round(height)
        msg.querySelector('.bubble').style.height = (hPx + 20) + 'px'
        msg.querySelector('.height-tag').textContent = `${hPx}px · ${lineCount}行`
      })
    }

    // Update initial heights
    document.fonts.ready.then(() => {
      const msgs = chat.querySelectorAll('.msg')
      msgs.forEach((msg, i) => {
        const bubbleText = msg.querySelector('.bubble').textContent
        const { height, lineCount } = getBubbleHeight(bubbleText)
        const hPx = Math.round(height)
        msg.querySelector('.bubble').style.height = (hPx + 20) + 'px'
        const tagEl = document.getElementById(`h${i}`)
        if (tagEl) tagEl.textContent = `${hPx}px · ${lineCount}行`
      })
    })
  </script>
</body>
</html>
