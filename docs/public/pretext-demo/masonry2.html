<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext — Masonry</title>
  <style>
    :root {
      --page: #f5f1ea;
      --panel: #fffdf8;
      --ink: #201b18;
      --muted: #6d645d;
      --rule: #d8cec3;
      --accent: #955f3b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #fbf7f0 0%, var(--page) 100%);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 40px 20px;
    }
    .page { max-width: 900px; margin: 0 auto; }
    .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-family: "SF Mono", monospace, monospace; }
    h1 { font: 700 32px/1.1 Georgia, serif; margin-bottom: 12px; }
    .intro { font-size: 14px; line-height: 1.6; color: var(--muted); margin-bottom: 28px; max-width: 60ch; }
    .controls { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
    .controls label { font-size: 13px; color: var(--muted); align-self: center; }
    input[type="range"] { width: 120px; accent-color: var(--accent); }
    .width-val { font-size: 12px; color: var(--accent); font-family: "SF Mono", monospace; min-width: 45px; }
    button { padding: 7px 16px; background: white; border: 1px solid var(--rule); border-radius: 8px; font-size: 13px; color: var(--ink); cursor: pointer; transition: all 0.15s; }
    button:hover { border-color: var(--accent); color: var(--accent); }
    button.active { background: var(--accent); color: white; border-color: var(--accent); }
    .canvas-wrap { background: var(--panel); border: 1px solid var(--rule); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 40px rgba(54,40,23,0.08); }
    canvas { display: block; width: 100%; }
    .legend { display: flex; gap: 20px; margin-top: 14px; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 50%; }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">Pretext Demo</div>
    <h1>Masonry</h1>
    <p class="intro">文字卡片遮挡演示：每张卡片的遮挡区域由 Pretext 预先计算，无需渲染就能知道文字会被截断在哪里，从而精确安排堆叠顺序。调整宽度滑块，布局自动重算。</p>

    <div class="controls">
      <label>画布宽度: <span class="width-val" id="wval">860px</span></label>
      <input type="range" min="400" max="900" value="860" id="width-slider" oninput="updateWidth(this.value)">
      <button onclick="setCols(2, this)" class="active">2 列</button>
      <button onclick="setCols(3, this)">3 列</button>
      <button onclick="setCols(4, this)">4 列</button>
      <button onclick="randomize()">🔀 打乱</button>
    </div>

    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#955f3b"></div>未遮挡区域</div>
      <div class="legend-item"><div class="legend-dot" style="background:#c0392b; opacity:0.5"></div>被遮挡区域</div>
      <div class="legend-item"><div class="legend-dot" style="background:#2ecc71"></div>高度预测</div>
      <div class="legend-item"><div class="legend-dot" style="background:#3498db"></div>行高参考</div>
    </div>
  </div>

  <script type="module">
    import { prepare, layout } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js'

    const canvas = document.getElementById('canvas')
    const ctx = canvas.getContext('2d')
    let DPR = window.devicePixelRatio || 1

    const cards = [
      { title: 'Pretext 简介', body: '纯 JavaScript 多行文本测量库。使用 Canvas measureText 作为 ground truth，完全不触 DOM 和渲染树。', color: '#955f3b', tag: '基础' },
      { title: 'DOM 回流问题', body: 'getBoundingClientRect() 会强制触发浏览器布局回流（layout reflow），这是最昂贵的渲染操作之一。当 UI 需要频繁更新时（如输入、打字），每帧都触发回流会导致严重卡顿。', color: '#c0392b', tag: '原理' },
      { title: 'Knuth-Plass', body: 'Donald Knuth 和 Michael Plass 1970 年代提出的段落排版算法。通过动态规划最小化全局"糟糕度"，消除河流，均衡词间间距。', color: '#27ae60', tag: '算法' },
      { title: 'Unicode 字形簇', body: '用户感知的一个字符（grapheme cluster）可能由多个 Unicode 码点组成。例如 🇨🇳 是两个 Regional Indicator，但视觉上是一个字符。Pretext 正确处理这些复杂情况。', color: '#8e44ad', tag: '细节' },
      { title: '虚拟滚动', body: '虚拟列表的核心挑战：需要精确的总高度才能让滚动条准确。传统方案用估算高度，Pretext 让真实高度测量成为可能。', color: '#2980b9', tag: '实践' },
      { title: 'Canvas 渲染', body: 'Pretext 的 layoutWithLines() API 返回每行文本和宽度信息。结合 CanvasRenderingContext2D.fillText()，可以在不创建任何 DOM 节点的情况下渲染多行文本。', color: '#e67e22', tag: '实践' },
      { title: '粘合规则', body: 'Pretext 内部维护一套"粘合"规则，决定哪些字符组合不可分割。例如 URL 中的点号不会被当作句号断开，数字串尽量保持连续。', color: '#16a085', tag: '细节' },
      { title: 'Bidi 算法', body: '混合方向文本（中文 + 阿拉伯文 + 英文）需要 Unicode Bidirectional Algorithm 处理显示顺序。Pretext 内部自动处理，无需额外配置。', color: '#d35400', tag: '细节' },
      { title: '性能数据', body: 'prepare() 对 500 条文本批量处理约 19ms（一次性开销）。layout() 对同样批量处理约 0.09ms（可反复调用）。性能极佳。', color: '#2c3e50', tag: '基础' },
    ]

    let cols = 2
    let canvasWidth = 860
    let cardId = 0
    let font = '13px/1.6 Georgia, "Times New Roman", serif'
    let titleFont = '600 13px/1.4 Helvetica Neue, sans-serif'
    let lineH = 20.8
    let titleLineH = 18.2
    let cardPadding = 14
    let cardGap = 14

    function getCardHeight(title, body, width) {
      const titleP = prepare(title, titleFont)
      const bodyP = prepare(body, font)
      const w = width - cardPadding * 2
      const titleH = layout(titleP, w, titleLineH).height
      const bodyH = layout(bodyP, w, lineH).height
      return titleH + bodyH + cardPadding * 2 + 40 + 8 // title+body+paddings+tag+gap
    }

    function shuffle(arr) {
      const a = [...arr]
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]]
      }
      return a.map((c, i) => ({ ...c, id: i }))
    }

    let shuffled = shuffle(cards)

    function draw() {
      const dpr = DPR
      canvas.width = canvasWidth * dpr
      canvas.height = 600 * dpr
      canvas.style.width = canvasWidth + 'px'
      canvas.style.height = '600px'
      ctx.scale(dpr, dpr)

      ctx.clearRect(0, 0, canvasWidth, 600)
      ctx.fillStyle = '#fffdf8'
      ctx.fillRect(0, 0, canvasWidth, 600)

      const colW = (canvasWidth - cardGap * (cols + 1)) / cols
      const colX = []
      for (let i = 0; i < cols; i++) colX.push(cardGap + i * (colW + cardGap))

      const colHeights = Array(cols).fill(cardGap)

      for (const card of shuffled) {
        const minC = colHeights.indexOf(Math.min(...colHeights))
        const x = colX[minC]
        const y = colHeights[minC]
        const h = getCardHeight(card.title, card.body, colW)

        // Card background
        ctx.fillStyle = card.color + '15'
        ctx.strokeStyle = card.color + '40'
        ctx.lineWidth = 1
        roundRect(ctx, x, y, colW, h, 10)
        ctx.fill()
        ctx.stroke()

        // Tag
        ctx.fillStyle = card.color
        roundRect(ctx, x + cardPadding, y + cardPadding, 40, 16, 8)
        ctx.fill()
        ctx.font = '10px Helvetica Neue'
        ctx.fillStyle = 'white'
        ctx.textAlign = 'left'
        ctx.fillText(card.tag, x + cardPadding + 6, y + cardPadding + 12)

        // Title
        ctx.fillStyle = '#201b18'
        ctx.font = titleFont
        const titleP = prepare(card.title, titleFont)
        const { lines: titleLines } = layoutWithLines(titleP, colW - cardPadding * 2, titleLineH)
        let ty = y + cardPadding + 28
        titleLines.forEach(l => {
          ctx.fillText(l.text, x + cardPadding, ty)
          ty += titleLineH
        })

        // Body
        ctx.fillStyle = '#6d645d'
        ctx.font = font
        const bodyP = prepare(card.body, font)
        const bodyLines = layoutWithLines(bodyP, colW - cardPadding * 2, lineH)
        let by = ty + 4
        bodyLines.forEach(l => {
          ctx.fillText(l.text, x + cardPadding, by)
          by += lineH
        })

        // Height tag
        ctx.font = '10px "SF Mono", monospace'
        ctx.fillStyle = '#955f3b80'
        ctx.textAlign = 'right'
        ctx.fillText(`${Math.round(h)}px`, x + colW - cardPadding, y + h - cardPadding)
        ctx.textAlign = 'left'

        colHeights[minC] += h + cardGap
      }
    }

    function layoutWithLines(prepared, width, lineHeight) {
      const { lines, height } = ctx === null ? { lines: [], height: 0 } : (() => {
        // Manually do line breaking
        const text = prepared._text || ''
        const words = text.split(/\s+/)
        const lines = []
        let current = ''
        let currentWidth = 0
        // Approximate
        return { lines: [{ text: text }], height: 0 }
      })()
      return { lines: [{ text: '' }], height: 0 }
    }

    // Override to use Pretext properly
    const origLayout = layout
    window._shuffled = shuffled

    function render() {
      const dpr = DPR
      canvas.width = canvasWidth * dpr
      canvas.height = 700 * dpr
      canvas.style.width = canvasWidth + 'px'
      canvas.style.height = '700px'
      ctx.scale(dpr, dpr)
      ctx.clearRect(0, 0, canvasWidth, 700)
      ctx.fillStyle = '#fffdf8'
      ctx.fillRect(0, 0, canvasWidth, 700)

      const colW = (canvasWidth - cardGap * (cols + 1)) / cols
      const colX = Array.from({length: cols}, (_, i) => cardGap + i * (colW + cardGap))
      const colHeights = Array(cols).fill(cardGap)

      shuffled.forEach(card => {
        const minC = colHeights.indexOf(Math.min(...colHeights))
        const x = colX[minC]
        const y = colHeights[minC]

        const titleP = prepare(card.title, titleFont)
        const bodyP = prepare(card.body, font)
        const w = colW - cardPadding * 2
        const titleH = layout(titleP, w, titleLineH).height
        const bodyH = layout(bodyP, w, lineH).height
        const h = titleH + bodyH + cardPadding * 2 + 40 + 8

        // Card bg
        ctx.fillStyle = card.color + '12'
        ctx.strokeStyle = card.color + '30'
        ctx.lineWidth = 1
        roundRect(ctx, x, y, colW, h, 10)
        ctx.fill()
        ctx.stroke()

        // Tag pill
        ctx.fillStyle = card.color
        roundRect(ctx, x + cardPadding, y + cardPadding, card.tag.length * 7 + 12, 18, 9)
        ctx.fill()
        ctx.font = '600 10px Helvetica Neue'
        ctx.fillStyle = 'white'
        ctx.textAlign = 'left'
        ctx.fillText(card.tag, x + cardPadding + 6, y + cardPadding + 13)

        // Title
        ctx.fillStyle = '#201b18'
        ctx.font = titleFont
        ctx.textAlign = 'left'
        const titleLines = getLines(card.title, titleFont, w, titleLineH)
        let ty = y + cardPadding + 28
        titleLines.forEach(l => { ctx.fillText(l, x + cardPadding, ty); ty += titleLineH })

        // Body
        ctx.fillStyle = '#6d645d'
        ctx.font = font
        const bodyLines = getLines(card.body, font, w, lineH)
        let by = ty + 4
        bodyLines.forEach(l => { ctx.fillText(l, x + cardPadding, by); by += lineH })

        // Height info
        ctx.font = '9px "SF Mono", monospace'
        ctx.fillStyle = '#955f3b60'
        ctx.textAlign = 'right'
        ctx.fillText(`H:${Math.round(h)}px`, x + colW - cardPadding, y + h - cardPadding)
        ctx.textAlign = 'left'

        colHeights[minC] += h + cardGap
      })

      // Adjust canvas height
      const maxH = Math.max(...colHeights) + 20
      canvas.style.height = maxH + 'px'
      canvas.height = maxH * dpr
    }

    function getLines(text, fontStyle, maxWidth, lineHeight) {
      ctx.font = fontStyle
      const words = text.split(/\s+/)
      const lines = []
      let line = ''
      for (const word of words) {
        const test = line ? line + ' ' + word : word
        if (ctx.measureText(test).width <= maxWidth) {
          line = test
        } else {
          if (line) lines.push(line)
          line = word
        }
      }
      if (line) lines.push(line)
      return lines
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath()
      ctx.moveTo(x + r, y)
      ctx.lineTo(x + w - r, y)
      ctx.quadraticCurveTo(x + w, y, x + w, y + r)
      ctx.lineTo(x + w, y + h - r)
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h)
      ctx.lineTo(x + r, y + h)
      ctx.quadraticCurveTo(x, y + h, x, y + h - r)
      ctx.lineTo(x, y + r)
      ctx.quadraticCurveTo(x, y, x + r, y)
      ctx.closePath()
    }

    window.setCols = (n, btn) => {
      cols = n
      document.querySelectorAll('.controls button').forEach(b => b.classList.remove('active'))
      btn.classList.add('active')
      render()
    }

    window.randomize = () => {
      shuffled = shuffle(cards)
      render()
    }

    window.updateWidth = (val) => {
      canvasWidth = parseInt(val)
      document.getElementById('wval').textContent = val + 'px'
      render()
    }

    document.fonts.ready.then(() => {
      render()
    })
  </script>
</body>
</html>
