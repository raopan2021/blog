<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pretext — Typographic Scale</title>
  <style>
    :root {
      --page: #f5f1ea;
      --panel: #fffdf8;
      --ink: #201b18;
      --muted: #6d645d;
      --rule: #d8cec3;
      --accent: #955f3b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: linear-gradient(180deg, #fbf7f0 0%, var(--page) 100%);
      color: var(--ink);
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      padding: 40px 20px;
    }
    .page { max-width: 780px; margin: 0 auto; }
    .eyebrow { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; font-family: "SF Mono", ui-monospace, monospace; }
    h1 { font: 700 32px/1.1 Georgia, serif; margin-bottom: 12px; }
    .intro { font-size: 14px; line-height: 1.6; color: var(--muted); margin-bottom: 28px; }
    .section { margin-bottom: 40px; }
    .section-title { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent); margin-bottom: 14px; font-family: "SF Mono", monospace; }
    .scale-display { background: var(--panel); border: 1px solid var(--rule); border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(54,40,23,0.06); }
    .scale-row { display: flex; align-items: baseline; gap: 20px; padding: 8px 0; border-bottom: 1px solid var(--rule); }
    .scale-row:last-child { border-bottom: none; }
    .scale-label { font-size: 11px; color: var(--muted); font-family: "SF Mono", monospace; min-width: 120px; flex-shrink: 0; }
    .scale-text { flex: 1; color: var(--ink); word-break: break-word; }
    .scale-meta { font-size: 10px; color: var(--accent); font-family: "SF Mono", monospace; min-width: 120px; text-align: right; flex-shrink: 0; }
    .controls { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 28px; align-items: center; }
    .controls label { font-size: 13px; color: var(--muted); }
    input[type="range"] { width: 140px; accent-color: var(--accent); }
    .val { font-size: 12px; color: var(--accent); font-family: "SF Mono", monospace; min-width: 45px; }
    .color-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
    .color-card { background: var(--panel); border: 1px solid var(--rule); border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(54,40,23,0.05); }
    .color-swatch { width: 36px; height: 36px; border-radius: 50%; margin-bottom: 10px; }
    .color-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .color-hex { font-size: 12px; color: var(--muted); font-family: "SF Mono", monospace; }
    .color-text { font-size: 11px; color: var(--accent); margin-top: 6px; }
    .note { font-size: 12px; color: var(--muted); line-height: 1.6; margin-top: 28px; padding: 14px; background: var(--panel); border: 1px solid var(--rule); border-radius: 10px; }
  </style>
</head>
<body>
  <div class="page">
    <div class="eyebrow">Pretext Demo</div>
    <h1>Typographic Scale</h1>
    <p class="intro">用 Pretext 精确测量不同字体大小下的行高和段落高度。调整容器宽度，观察每种字号的实际渲染尺寸如何变化。</p>

    <div class="controls">
      <label>容器宽度: <span class="val" id="wval">700px</span></label>
      <input type="range" min="300" max="780" value="700" id="width-slider" oninput="updateWidth(this.value)">
    </div>

    <div class="section">
      <div class="section-title">字体大小对比</div>
      <div class="scale-display" id="scale"></div>
    </div>

    <div class="note">
      💡 <strong>为什么行高不是 font-size 的倍数？</strong> CSS 的 line-height 是推荐值，但实际渲染高度由字体设计决定。Pretext 使用 Canvas measureText 读取精确的字形度量，可以准确预测实际渲染高度，而不是依赖 CSS 的近似值。
    </div>
  </div>

  <script type="module">
    import { prepare, layout } from 'https://cdn.jsdelivr.net/npm/@chenglou/pretext@0.0.3/dist/layout.js'

    const sample = 'The quick brown fox jumps over the lazy dog. Typography is the craft of endowing human language with a durable visual form.'

    const scales = [
      { label: 'Display', size: 36, family: 'Georgia, serif', color: '#201b18' },
      { label: 'H1', size: 28, family: 'Georgia, serif', color: '#201b18' },
      { label: 'H2', size: 22, family: 'Georgia, serif', color: '#201b18' },
      { label: 'H3', size: 18, family: 'Helvetica Neue, sans-serif', color: '#201b18' },
      { label: 'Body Large', size: 16, family: 'Helvetica Neue, sans-serif', color: '#201b18' },
      { label: 'Body', size: 14, family: 'Helvetica Neue, sans-serif', color: '#6d645d' },
      { label: 'Caption', size: 12, family: 'Helvetica Neue, sans-serif', color: '#6d645d' },
      { label: 'Small', size: 11, family: 'Helvetica Neue, sans-serif', color: '#6d645d' },
    ]

    let width = 700

    function render() {
      const el = document.getElementById('scale')
      el.innerHTML = ''

      scales.forEach(scale => {
        const font = `${scale.size}px/1.5 ${scale.family}`
        const prepared = prepare(sample, font)
        const { height, lineCount } = layout(prepared, width - 48, scale.size * 1.5)

        const row = document.createElement('div')
        row.className = 'scale-row'
        row.innerHTML = `
          <span class="scale-label">${scale.label}</span>
          <span class="scale-text" style="font:${scale.size}px/1.5 ${scale.family};color:${scale.color}">${sample}</span>
          <span class="scale-meta">${Math.round(height)}px · ${lineCount}行 · ${scale.size}px</span>
        `
        el.appendChild(row)
      })
    }

    window.updateWidth = (val) => {
      width = parseInt(val)
      document.getElementById('wval').textContent = val + 'px'
      render()
    }

    document.fonts.ready.then(() => render())
  </script>
</body>
</html>
